<!-- @dsCard group="Colors" viewport="700x180" name="Purple — the smoke accent" subtitle="Glow, highlights, key moments — used sparingly" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--ink-900); }
  .row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  .sw { border-radius: var(--radius-md); height: 84px; display: flex; align-items: flex-end; padding: 8px; border: 1px solid var(--border-hairline); }
  .lab { font-family: var(--font-sans); font-size: 10.5px; letter-spacing: var(--ls-wide); }
  .hex { font-family: var(--font-mono); font-size: 9.5px; margin-top: 3px; opacity: .85; }
  .dark { color: #1c1030; } .light { color: var(--purple-100); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--purple-100)"><div class="dark"><div class="lab">100</div><div class="hex">#EADBFB</div></div></div>
    <div class="sw" style="background:var(--purple-200)"><div class="dark"><div class="lab">200</div><div class="hex">#D3B6F4</div></div></div>
    <div class="sw" style="background:var(--purple-300)"><div class="dark"><div class="lab">300</div><div class="hex">#BB93EC</div></div></div>
    <div class="sw" style="background:var(--purple-400)"><div class="dark"><div class="lab">400</div><div class="hex">#A172E2</div></div></div>
    <div class="sw" style="background:var(--purple-500);box-shadow:var(--glow-purple-soft)"><div class="light"><div class="lab">500</div><div class="hex">#8B53D9</div></div></div>
    <div class="sw" style="background:var(--purple-600)"><div class="light"><div class="lab">600</div><div class="hex">#6E3BB8</div></div></div>
    <div class="sw" style="background:var(--purple-800)"><div class="light"><div class="lab">800</div><div class="hex">#361C5E</div></div></div>
  </div>
</body>
</html>
