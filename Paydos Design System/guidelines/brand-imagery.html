<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 28px; background: var(--ink-900); display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
  .ph { height: 158px; border-radius: var(--radius-lg); border: 1px solid var(--glass-border); position: relative; overflow: hidden; display: flex; align-items: flex-end; padding: 12px; box-shadow: var(--glass-shadow), var(--glass-highlight); }
  .ph img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .ph .ov { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(6,6,8,0.05), rgba(6,6,8,0.72)); }
  .cap { font-family: var(--font-sans); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-secondary); position: relative; z-index: 2; }
</style>
</head>
<body>
  <div class="ph"><img src="../assets/lounge-okey.jpg" alt="" /><div class="ov"></div><span class="cap">Okey-Tische</span></div>
  <div class="ph"><img src="../assets/lounge-bar.jpg" alt="" /><div class="ov"></div><span class="cap">Die Bar</span></div>
  <div class="ph"><img src="../assets/lounge-purple.jpg" alt="" /><div class="ov"></div><span class="cap">Die Lounge</span></div>
</body>
</html>
