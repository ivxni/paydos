<!-- @dsCard group="Colors" viewport="700x180" name="Silver — metallic neutral" subtitle="The brand neutral; text, borders, sheen" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--ink-900); }
  .row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  .sw { border-radius: var(--radius-md); height: 84px; display: flex; align-items: flex-end; padding: 8px; border: 1px solid var(--border-hairline); }
  .lab { font-family: var(--font-sans); font-size: 10.5px; letter-spacing: var(--ls-wide); }
  .hex { font-family: var(--font-mono); font-size: 9.5px; margin-top: 3px; opacity: .8; }
  .dark { color: var(--ink-900); } .light { color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--silver-50)"><div class="dark"><div class="lab">50</div><div class="hex">#F6F8FA</div></div></div>
    <div class="sw" style="background:var(--silver-100)"><div class="dark"><div class="lab">100</div><div class="hex">#E8EBEF</div></div></div>
    <div class="sw" style="background:var(--silver-200)"><div class="dark"><div class="lab">200</div><div class="hex">#D2D6DC</div></div></div>
    <div class="sw" style="background:var(--silver-300)"><div class="dark"><div class="lab">300</div><div class="hex">#B7BCC4</div></div></div>
    <div class="sw" style="background:var(--silver-400)"><div class="dark"><div class="lab">400</div><div class="hex">#969BA4</div></div></div>
    <div class="sw" style="background:var(--silver-500)"><div class="light"><div class="lab">500</div><div class="hex">#767B85</div></div></div>
    <div class="sw" style="background:var(--silver-700)"><div class="light"><div class="lab">700</div><div class="hex">#3F424A</div></div></div>
  </div>
</body>
</html>
