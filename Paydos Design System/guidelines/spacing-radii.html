<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px 28px; background: var(--ink-900); display: flex; gap: 18px; align-items: center; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 9px; }
  .b { width: 74px; height: 74px; background: var(--ink-700); border: 1px solid var(--border-soft); border-top: 1px solid var(--border-strong); }
  .n { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="col"><div class="b" style="border-radius:var(--radius-xs)"></div><div class="n">xs · 3</div></div>
  <div class="col"><div class="b" style="border-radius:var(--radius-sm)"></div><div class="n">sm · 6</div></div>
  <div class="col"><div class="b" style="border-radius:var(--radius-md)"></div><div class="n">md · 10</div></div>
  <div class="col"><div class="b" style="border-radius:var(--radius-lg)"></div><div class="n">lg · 14</div></div>
  <div class="col"><div class="b" style="border-radius:var(--radius-xl)"></div><div class="n">xl · 20</div></div>
  <div class="col"><div class="b" style="border-radius:var(--radius-pill)"></div><div class="n">pill</div></div>
</body>
</html>
