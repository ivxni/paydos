<!-- @dsCard group="Type" viewport="700x170" name="Eyebrow & labels" subtitle="Upper-case, wide-tracked — the sub-wordmark voice" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 26px 28px; background: var(--ink-900); font-family: var(--font-sans); display: flex; flex-direction: column; gap: 18px; }
  .eyebrow { font-size: 11.5px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--text-secondary); }
  .label { font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-muted); font-weight: 500; }
  .meta { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="eyebrow">Shisha &amp; Okey Lounge — Est. Paydos</div>
  <div class="label">Reservations · Menu · Events</div>
  <div class="meta">eyebrow 0.32em tracking · label 0.16em · always upper-case</div>
</body>
</html>
