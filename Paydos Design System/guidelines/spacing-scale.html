<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px 28px; background: var(--ink-900); display: flex; align-items: flex-end; gap: 16px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--gradient-purple); border-radius: 2px; width: 22px; }
  .n { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="col"><div class="bar" style="height:8px"></div><div class="n">1·4</div></div>
  <div class="col"><div class="bar" style="height:16px"></div><div class="n">2·8</div></div>
  <div class="col"><div class="bar" style="height:24px"></div><div class="n">3·12</div></div>
  <div class="col"><div class="bar" style="height:32px"></div><div class="n">4·16</div></div>
  <div class="col"><div class="bar" style="height:48px"></div><div class="n">6·24</div></div>
  <div class="col"><div class="bar" style="height:64px"></div><div class="n">8·32</div></div>
  <div class="col"><div class="bar" style="height:80px"></div><div class="n">10·40</div></div>
  <div class="col"><div class="bar" style="height:96px"></div><div class="n">12·48</div></div>
</body>
</html>
