<!-- @dsCard group="Spacing" viewport="700x200" name="Elevation & glow" subtitle="Lighter surface + hairline + ambient shadow; purple glow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 30px 28px; background: var(--ink-900); display: flex; gap: 22px; align-items: center; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 11px; }
  .b { width: 110px; height: 76px; border-radius: var(--radius-lg); background: var(--ink-750); border: 1px solid var(--border-hairline); }
  .n { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="col"><div class="b" style="box-shadow:var(--shadow-sm)"></div><div class="n">shadow-sm</div></div>
  <div class="col"><div class="b" style="box-shadow:var(--shadow-md)"></div><div class="n">shadow-md</div></div>
  <div class="col"><div class="b" style="box-shadow:var(--shadow-lg)"></div><div class="n">shadow-lg</div></div>
  <div class="col"><div class="b" style="border-color:var(--border-accent);box-shadow:var(--glow-purple)"></div><div class="n">glow-purple</div></div>
</body>
</html>
