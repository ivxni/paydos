<!-- @dsCard group="Type" viewport="700x230" name="Display — Cormorant Garamond" subtitle="Editorial serif, set large with the silver shine" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 26px 28px; background: var(--ink-900); }
  .eyebrow { font-family: var(--font-sans); font-size: var(--fs-eyebrow); letter-spacing: var(--ls-eyebrow); text-transform: uppercase; color: var(--text-secondary); margin-bottom: 14px; }
  .d { font-family: var(--font-display); font-weight: 600; line-height: 1.05; letter-spacing: -0.02em; }
  .silver { background: var(--gradient-silver); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .meta { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); margin-top: 16px; }
</style>
</head>
<body>
  <div class="eyebrow">Shisha &amp; Okey Lounge</div>
  <div class="d silver" style="font-size:62px">Paydos</div>
  <div class="d" style="font-size:30px; color:var(--text-primary); font-style:italic; font-weight:500; margin-top:6px">An evening, unhurried.</div>
  <div class="meta">Cormorant Garamond · 400 / 500 / 600 · italic available · clip the silver gradient for headlines</div>
</body>
</html>
