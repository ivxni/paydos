<!-- @dsCard group="Brand" viewport="700x220" name="Silver-text motif" subtitle="Chrome gradient clipped to display type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 0; background: var(--gradient-page); height: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; position: relative; }
  .eyebrow { font-family: var(--font-sans); font-size: 11.5px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--text-secondary); }
  .big { font-family: var(--font-display); font-weight: 600; font-size: 76px; line-height: 1; letter-spacing: -0.02em; background: var(--gradient-silver); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .sub { font-family: var(--font-display); font-style: italic; font-size: 20px; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="eyebrow">Shisha &amp; Okey Lounge</div>
  <div class="big">Paydos</div>
  <div class="sub">where the night exhales</div>
</body>
</html>
